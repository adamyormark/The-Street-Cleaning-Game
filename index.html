<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>The Street Cleaning Game</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-border: #2a2d3a;
    --text: #e8e8ed;
    --text-dim: #8b8d97;
    --green: #34d399;
    --green-bg: rgba(52, 211, 153, 0.12);
    --red: #f87171;
    --red-bg: rgba(248, 113, 113, 0.12);
    --blue: #60a5fa;
    --blue-bg: rgba(96, 165, 250, 0.12);
    --gray: #4b4d57;
    --yellow: #fbbf24;
    --yellow-bg: rgba(251, 191, 36, 0.12);
    --purple: #a78bfa;
    --purple-bg: rgba(167, 139, 250, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    height: 100%;
    height: 100dvh;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100%;
    height: 100dvh;
    overflow: hidden;
    padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom);
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 8px 0 2px;
    text-align: center;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  header .date {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 1px;
  }

  .status-banner {
    margin: 6px 0 0;
    padding: 7px 12px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    line-height: 1.3;
    flex-shrink: 0;
  }

  .status-banner.suspended {
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid rgba(52, 211, 153, 0.25);
  }

  .status-banner.in-effect {
    background: var(--red-bg);
    color: var(--red);
    border: 1px solid rgba(248, 113, 113, 0.25);
  }

  .status-banner .reason {
    font-weight: 400;
    font-size: 11px;
    opacity: 0.85;
  }

  /* My Spot Banner */
  .my-spot {
    margin: 6px 0 0;
    padding: 8px 12px;
    border-radius: 10px;
    background: var(--purple-bg);
    border: 1px solid var(--purple);
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .my-spot-info {
    font-size: 13px;
    font-weight: 600;
    color: var(--purple);
    line-height: 1.3;
    flex: 1;
  }

  .my-spot-detail {
    font-weight: 400;
    font-size: 11px;
    opacity: 0.8;
    display: block;
    margin-top: 1px;
  }

  .my-spot-clear {
    background: none;
    border: 1px solid var(--purple);
    color: var(--purple);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }

  .hidden { display: none !important; }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 8px 0 5px 2px;
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .tap-hint {
    font-size: 10px;
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    opacity: 0.5;
    margin-right: 2px;
  }

  .days-strip {
    display: flex;
    gap: 5px;
    flex-shrink: 0;
  }

  .day-card {
    flex: 1;
    padding: 5px 2px;
    border-radius: 8px;
    text-align: center;
    background: var(--card);
    border: 1px solid var(--card-border);
    min-width: 0;
  }

  .day-card.today {
    border-color: var(--blue);
    background: var(--blue-bg);
  }

  .day-card .day-name {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .day-card.today .day-name { color: var(--blue); }

  .day-card .day-num {
    font-size: 16px;
    font-weight: 700;
    margin: 1px 0;
  }

  .day-card .day-status {
    font-size: 8px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 1px 4px;
    border-radius: 3px;
    white-space: nowrap;
  }

  .day-card .day-status.suspended { background: var(--green-bg); color: var(--green); }
  .day-card .day-status.in-effect { background: var(--red-bg); color: var(--red); }
  .day-card .day-status.no-cleaning { background: rgba(75, 77, 87, 0.3); color: var(--text-dim); }

  /* Recommendations */
  .recs {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-height: 0;
    overflow: hidden;
  }

  .rec-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 8px 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.15s, background 0.15s;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 0;
  }

  .rec-card:active { opacity: 0.85; }

  .rec-card.best {
    border-color: var(--green);
    background: var(--green-bg);
  }

  .rec-card.parked {
    border-color: var(--purple);
    background: var(--purple-bg);
  }

  .rec-card.pending {
    border-color: var(--yellow);
    background: var(--yellow-bg);
  }

  .rec-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1px;
  }

  .rec-day {
    font-size: 14px;
    font-weight: 700;
  }

  .rec-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 5px;
    white-space: nowrap;
  }

  .rec-badge.safe { background: var(--green-bg); color: var(--green); }
  .rec-badge.ok { background: var(--yellow-bg); color: var(--yellow); }
  .rec-badge.warn { background: var(--red-bg); color: var(--red); }

  .rec-detail {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.3;
  }

  .rec-detail strong { color: var(--text); }

  .rec-move {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    padding-top: 2px;
    border-top: 1px solid var(--card-border);
  }

  .rec-confirm {
    font-size: 12px;
    font-weight: 600;
    color: var(--yellow);
    margin-top: 2px;
  }

  /* Bottom row */
  .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 2px 2px;
    flex-shrink: 0;
  }

  .gear-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    padding: 2px 6px;
    -webkit-tap-highlight-color: transparent;
    opacity: 0.5;
  }

  .footer {
    font-size: 10px;
    color: var(--text-dim);
    opacity: 0.4;
  }

  .footer a { color: var(--text-dim); }

  /* Settings overlay */
  .settings-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }

  .settings-overlay.open { display: flex; }

  .settings-sheet {
    background: var(--bg);
    border-top: 1px solid var(--card-border);
    border-radius: 16px 16px 0 0;
    padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
    width: 100%;
    max-height: 70vh;
    overflow-y: auto;
  }

  .settings-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .settings-title {
    font-size: 16px;
    font-weight: 700;
  }

  .settings-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 24px;
    cursor: pointer;
    padding: 0 4px;
    -webkit-tap-highlight-color: transparent;
  }

  .settings-group { margin-bottom: 16px; }
  .settings-group:last-child { margin-bottom: 0; }
  .settings-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .checkbox-row { display: flex; flex-wrap: wrap; gap: 8px; }

  .checkbox-row .chip {
    padding: 8px 14px;
    border-radius: 8px;
    background: rgba(75, 77, 87, 0.3);
    border: 1px solid var(--card-border);
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s ease;
    user-select: none;
    -webkit-user-select: none;
  }

  .checkbox-row .chip.active {
    background: var(--blue-bg);
    border-color: var(--blue);
    color: var(--blue);
  }

  .schedule-list { display: flex; flex-direction: column; gap: 6px; }

  .schedule-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: rgba(75, 77, 87, 0.2);
    border-radius: 8px;
    font-size: 14px;
  }

  .schedule-item .remove-btn {
    background: none;
    border: none;
    color: var(--red);
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
    -webkit-tap-highlight-color: transparent;
  }

  .add-schedule { display: flex; gap: 8px; margin-top: 8px; }

  .add-schedule select {
    flex: 1;
    padding: 8px 10px;
    border-radius: 8px;
    background: rgba(75, 77, 87, 0.3);
    border: 1px solid var(--card-border);
    color: var(--text);
    font-size: 14px;
    -webkit-appearance: none;
  }

  .add-schedule button {
    padding: 8px 14px;
    border-radius: 8px;
    background: var(--blue-bg);
    border: 1px solid var(--blue);
    color: var(--blue);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }
</style>
</head>
<body>

<header>
  <h1>The Street Cleaning Game</h1>
  <div class="date" id="todayDate"></div>
</header>

<div id="statusBanner" class="status-banner"></div>

<div id="mySpot" class="my-spot hidden">
  <div class="my-spot-info" id="mySpotInfo"></div>
  <button class="my-spot-clear" id="mySpotClear">Clear</button>
</div>

<div class="section-label">Next 7 Days</div>
<div class="days-strip" id="daysStrip"></div>

<div class="section-label">
  Spot Recommendations
  <span class="tap-hint" id="tapHint">tap to park</span>
</div>
<div class="recs" id="recs"></div>

<div class="bottom-row">
  <span class="footer"><a href="https://www.nyc.gov/html/dot/downloads/pdf/asp-calendar-2026.pdf">NYC DOT 2026 ASP Calendar</a></span>
  <button class="gear-btn" id="gearBtn">&#9881;</button>
</div>

<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-sheet">
    <div class="settings-header">
      <div class="settings-title">Settings</div>
      <button class="settings-close" id="settingsClose">&times;</button>
    </div>
    <div class="settings-group">
      <label>Spot types near you</label>
      <div class="checkbox-row" id="spotTypeChips"></div>
    </div>
    <div class="settings-group">
      <label>Evenings you can't move your car</label>
      <div class="schedule-list" id="scheduleList"></div>
      <div class="add-schedule">
        <select id="scheduleDay">
          <option value="0">Sunday evening</option>
          <option value="1">Monday evening</option>
          <option value="2">Tuesday evening</option>
          <option value="3">Wednesday evening</option>
          <option value="4">Thursday evening</option>
          <option value="5">Friday evening</option>
          <option value="6">Saturday evening</option>
        </select>
        <button id="addScheduleBtn">Add</button>
      </div>
    </div>
  </div>
</div>

<script>
// --- 2026 NYC ASP Suspension Calendar (NYC DOT) ---
const SUSPENSIONS_2026 = [
  { date: '2026-01-01', name: "New Year's Day" },
  { date: '2026-01-06', name: "Three Kings' Day" },
  { date: '2026-01-19', name: 'Martin Luther King Jr. Day' },
  { date: '2026-02-12', name: "Lincoln's Birthday" },
  { date: '2026-02-16', name: "Presidents' Day / Lunar New Year's Eve" },
  { date: '2026-02-17', name: 'Lunar New Year' },
  { date: '2026-02-18', name: 'Ash Wednesday / Losar' },
  { date: '2026-03-03', name: 'Purim' },
  { date: '2026-03-20', name: 'Eid al-Fitr' },
  { date: '2026-03-21', name: 'Eid al-Fitr' },
  { date: '2026-04-02', name: 'Passover / Holy Thursday' },
  { date: '2026-04-03', name: 'Passover / Good Friday' },
  { date: '2026-04-08', name: 'Passover (7th day)' },
  { date: '2026-04-09', name: 'Passover (8th day) / Orthodox Holy Thursday' },
  { date: '2026-04-10', name: 'Orthodox Good Friday' },
  { date: '2026-05-14', name: 'Solemnity of the Ascension' },
  { date: '2026-05-22', name: 'Shavuot' },
  { date: '2026-05-23', name: 'Shavuot' },
  { date: '2026-05-25', name: 'Memorial Day' },
  { date: '2026-05-27', name: 'Eid al-Adha' },
  { date: '2026-05-28', name: 'Eid al-Adha' },
  { date: '2026-06-19', name: 'Juneteenth' },
  { date: '2026-07-03', name: 'Independence Day (observed)' },
  { date: '2026-07-04', name: 'Independence Day' },
  { date: '2026-07-05', name: 'Independence Day (observed)' },
  { date: '2026-07-23', name: "Tisha B'Av" },
  { date: '2026-08-15', name: 'Feast of the Assumption' },
  { date: '2026-09-07', name: 'Labor Day' },
  { date: '2026-09-12', name: 'Rosh Hashanah' },
  { date: '2026-09-13', name: 'Rosh Hashanah' },
  { date: '2026-09-21', name: 'Yom Kippur' },
  { date: '2026-09-26', name: 'Sukkot' },
  { date: '2026-09-27', name: 'Sukkot' },
  { date: '2026-10-03', name: 'Shemini Atzeret' },
  { date: '2026-10-04', name: 'Simchat Torah' },
  { date: '2026-10-12', name: "Indigenous Peoples' Day" },
  { date: '2026-11-01', name: "All Saints' Day" },
  { date: '2026-11-03', name: 'Election Day' },
  { date: '2026-11-08', name: 'Diwali' },
  { date: '2026-11-11', name: 'Veterans Day' },
  { date: '2026-11-26', name: 'Thanksgiving' },
  { date: '2026-12-08', name: 'Immaculate Conception' },
  { date: '2026-12-25', name: 'Christmas Day' },
];

const SUSPENSION_MAP = new Map(SUSPENSIONS_2026.map(s => [s.date, s.name]));

const DAY_NAMES = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
const DAY_ABBR = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
const MONTH_NAMES = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

// --- Helpers ---
function toDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function isSuspended(d) {
  return SUSPENSION_MAP.get(toDateStr(d)) || null;
}

function daysBetween(a, b) {
  const msPerDay = 86400000;
  const aClean = new Date(a.getFullYear(), a.getMonth(), a.getDate());
  const bClean = new Date(b.getFullYear(), b.getMonth(), b.getDate());
  return Math.round((bClean - aClean) / msPerDay);
}

// --- Settings ---
const DEFAULT_SPOT_TYPES = [1, 2, 4, 5]; // Mon, Tue, Thu, Fri
const DEFAULT_BLOCKED_EVENINGS = [];

function loadSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem('asp-settings'));
    if (saved) return saved;
  } catch {}
  return { spotTypes: DEFAULT_SPOT_TYPES, blockedEvenings: DEFAULT_BLOCKED_EVENINGS };
}

function saveSettings(s) {
  localStorage.setItem('asp-settings', JSON.stringify(s));
}

let settings = loadSettings();

// --- Parked Spot Tracking ---
function loadParkedSpot() {
  try {
    const saved = JSON.parse(localStorage.getItem('asp-parked-spot'));
    if (saved && saved.dayOfWeek !== undefined) return saved;
  } catch {}
  return null;
}

function saveParkedSpot(spot) {
  if (spot) {
    localStorage.setItem('asp-parked-spot', JSON.stringify(spot));
  } else {
    localStorage.removeItem('asp-parked-spot');
  }
}

let parkedSpot = loadParkedSpot();
let pendingParkDay = null;

function validateParkedSpot() {
  if (!parkedSpot) return;

  // Check if a non-suspended cleaning day has passed since parking
  const parkedDate = new Date(parkedSpot.parkedAt + 'T12:00:00');
  const today = new Date();
  const todayClean = new Date(today.getFullYear(), today.getMonth(), today.getDate());

  let d = addDays(parkedDate, 1);
  while (d < todayClean) {
    if (d.getDay() === parkedSpot.dayOfWeek && d.getDay() !== 0) {
      const reason = isSuspended(d);
      if (!reason) {
        // Cleaning happened — auto-clear expired spot
        parkedSpot = null;
        saveParkedSpot(null);
        return;
      }
    }
    d = addDays(d, 1);
  }
}

function parkInSpot(dayOfWeek) {
  parkedSpot = {
    dayOfWeek: dayOfWeek,
    parkedAt: toDateStr(new Date())
  };
  saveParkedSpot(parkedSpot);
  renderMySpot();
  renderRecommendations();
}

function clearParkedSpot() {
  parkedSpot = null;
  saveParkedSpot(null);
  pendingParkDay = null;
  renderMySpot();
  renderRecommendations();
}

function handleRecCardTap(dayOfWeek, event) {
  event.stopPropagation();

  if (parkedSpot && parkedSpot.dayOfWeek === dayOfWeek) {
    // Already parked here — use the Clear button
    return;
  }

  if (pendingParkDay === dayOfWeek) {
    // Second tap — confirm
    parkInSpot(dayOfWeek);
    pendingParkDay = null;
  } else {
    // First tap — show pending state
    pendingParkDay = dayOfWeek;
    renderRecommendations();
  }
}

// --- Render: My Spot ---
function renderMySpot() {
  const el = document.getElementById('mySpot');
  if (!parkedSpot) {
    el.classList.add('hidden');
    document.getElementById('tapHint').textContent = 'tap to park';
    return;
  }

  document.getElementById('tapHint').textContent = '';

  const today = new Date();
  const todayClean = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const todayIsCleaningDay = todayClean.getDay() === parkedSpot.dayOfWeek
    && todayClean.getDay() !== 0
    && !isSuspended(todayClean);

  const infoEl = document.getElementById('mySpotInfo');

  if (todayIsCleaningDay) {
    infoEl.innerHTML =
      'Cleaning today! ' + DAY_NAMES[parkedSpot.dayOfWeek] + ' spot' +
      '<span class="my-spot-detail" style="color:var(--red);opacity:1">Move your car now</span>';
  } else {
    const analysis = analyzeSpot(parkedSpot.dayOfWeek);
    let timeLeft;
    if (analysis.safeDays <= 0) {
      timeLeft = 'Move tonight!';
    } else if (analysis.safeDays === 1) {
      timeLeft = '1 day left';
    } else {
      timeLeft = analysis.safeDays + ' days left';
    }

    infoEl.innerHTML =
      DAY_NAMES[parkedSpot.dayOfWeek] + ' spot — ' + timeLeft +
      '<span class="my-spot-detail">Move by ' +
      DAY_NAMES[analysis.moveByEvening.getDay()] + ' evening, ' +
      MONTH_NAMES[analysis.moveByEvening.getMonth()] + ' ' + analysis.moveByEvening.getDate() +
      '</span>';
  }

  el.classList.remove('hidden');
}

// --- Render: Status Banner ---
function renderStatusBanner() {
  const el = document.getElementById('statusBanner');
  const today = new Date();
  const reason = isSuspended(today);
  if (reason) {
    el.className = 'status-banner suspended';
    el.innerHTML = 'ASP suspended today <span class="reason">&middot; ' + reason + '</span>';
  } else if (today.getDay() === 0) {
    el.className = 'status-banner suspended';
    el.innerHTML = 'No street cleaning on Sundays';
  } else {
    el.className = 'status-banner in-effect';
    el.innerHTML = 'ASP is in effect today';
  }
}

// --- Render: Today's Date ---
function renderDate() {
  const d = new Date();
  document.getElementById('todayDate').textContent =
    DAY_NAMES[d.getDay()] + ', ' + MONTH_NAMES[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

// --- Render: 7-Day Strip ---
function renderDaysStrip() {
  const container = document.getElementById('daysStrip');
  container.innerHTML = '';
  const today = new Date();

  for (let i = 0; i < 7; i++) {
    const d = addDays(today, i);
    const dayOfWeek = d.getDay();
    const reason = isSuspended(d);
    const isCleaningDay = settings.spotTypes.includes(dayOfWeek);

    const card = document.createElement('div');
    card.className = 'day-card' + (i === 0 ? ' today' : '');

    let statusHtml;
    if (dayOfWeek === 0) {
      statusHtml = '<div class="day-status no-cleaning">No ASP</div>';
    } else if (reason) {
      statusHtml = '<div class="day-status suspended">Off</div>';
    } else if (!isCleaningDay) {
      statusHtml = '<div class="day-status no-cleaning">N/A</div>';
    } else {
      statusHtml = '<div class="day-status in-effect">Active</div>';
    }

    card.innerHTML =
      '<div class="day-name">' + DAY_ABBR[dayOfWeek] + '</div>' +
      '<div class="day-num">' + d.getDate() + '</div>' +
      statusHtml;

    container.appendChild(card);
  }
}

// --- Core Algorithm ---
function analyzeSpot(cleaningDayOfWeek) {
  const today = new Date();
  const todayClean = new Date(today.getFullYear(), today.getMonth(), today.getDate());

  let checkDate = addDays(todayClean, 1);
  while (checkDate.getDay() !== cleaningDayOfWeek) {
    checkDate = addDays(checkDate, 1);
  }

  let suspendedDates = [];
  let nextCleaningDate = null;

  for (let week = 0; week < 4; week++) {
    const candidate = addDays(checkDate, week * 7);
    const reason = isSuspended(candidate);
    if (candidate.getDay() === 0) {
      suspendedDates.push({ date: candidate, reason: 'Sunday' });
      continue;
    }
    if (reason) {
      suspendedDates.push({ date: candidate, reason });
    } else {
      nextCleaningDate = candidate;
      break;
    }
  }

  if (!nextCleaningDate) {
    nextCleaningDate = addDays(checkDate, 28);
  }

  const moveByEvening = addDays(nextCleaningDate, -1);
  const safeDays = daysBetween(todayClean, moveByEvening);

  const moveByDayOfWeek = moveByEvening.getDay();
  const hasConflict = settings.blockedEvenings.includes(moveByDayOfWeek);

  return {
    cleaningDay: cleaningDayOfWeek,
    nextCleaningDate,
    moveByEvening,
    safeDays,
    suspendedDates,
    hasConflict,
  };
}

// --- Render: Recommendations ---
function renderRecommendations() {
  const container = document.getElementById('recs');
  container.innerHTML = '';

  if (settings.spotTypes.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:20px;font-size:14px;">Select spot types in Settings</div>';
    return;
  }

  const analyses = settings.spotTypes.map(analyzeSpot);
  analyses.sort((a, b) => b.safeDays - a.safeDays);

  const bestSafe = analyses[0].safeDays;

  analyses.forEach(function(a) {
    const isParked = parkedSpot && parkedSpot.dayOfWeek === a.cleaningDay;
    const isPending = pendingParkDay === a.cleaningDay;
    const isBest = a.safeDays === bestSafe && a.safeDays > 0 && !isParked;

    const card = document.createElement('div');
    let cardClass = 'rec-card';
    if (isParked) cardClass += ' parked';
    else if (isPending) cardClass += ' pending';
    else if (isBest) cardClass += ' best';
    card.className = cardClass;

    let badgeClass, badgeText;
    if (a.safeDays >= 5) {
      badgeClass = 'safe';
      badgeText = a.safeDays + ' days safe';
    } else if (a.safeDays >= 3) {
      badgeClass = 'ok';
      badgeText = a.safeDays + ' days safe';
    } else {
      badgeClass = 'warn';
      badgeText = a.safeDays <= 0 ? 'Move tonight' : a.safeDays + (a.safeDays === 1 ? ' day' : ' days');
    }

    let detail = '';
    if (a.suspendedDates.length > 0) {
      const suspNames = a.suspendedDates.map(function(s) {
        return DAY_ABBR[s.date.getDay()] + ' ' + MONTH_NAMES[s.date.getMonth()] + ' ' + s.date.getDate() + ' (' + s.reason + ')';
      });
      detail = 'Suspended: ' + suspNames.join(', ') + '. ';
    }
    detail += 'Next cleaning: <strong>' + DAY_NAMES[a.nextCleaningDate.getDay()] + ', ' +
      MONTH_NAMES[a.nextCleaningDate.getMonth()] + ' ' + a.nextCleaningDate.getDate() + '</strong>';

    let moveText = 'Move by: ' + DAY_NAMES[a.moveByEvening.getDay()] + ' evening, ' +
      MONTH_NAMES[a.moveByEvening.getMonth()] + ' ' + a.moveByEvening.getDate();
    if (a.hasConflict) {
      moveText += ' <span style="color:var(--red)">Blocked evening</span>';
    }

    let titleText = DAY_NAMES[a.cleaningDay] + ' spot';
    if (isParked) titleText = 'Your car \u00B7 ' + titleText;

    let html =
      '<div class="rec-header">' +
        '<div class="rec-day">' + titleText + '</div>' +
        '<div class="rec-badge ' + badgeClass + '">' + badgeText + '</div>' +
      '</div>' +
      '<div class="rec-detail">' + detail + '</div>' +
      '<div class="rec-move">' + moveText + '</div>';

    if (isPending) {
      html += '<div class="rec-confirm">Tap again to confirm</div>';
    }

    card.innerHTML = html;

    card.addEventListener('click', function(e) {
      handleRecCardTap(a.cleaningDay, e);
    });

    container.appendChild(card);
  });
}

// --- Settings UI ---
function renderSpotTypeChips() {
  const container = document.getElementById('spotTypeChips');
  container.innerHTML = '';
  [1, 2, 3, 4, 5, 6].forEach(function(day) {
    const chip = document.createElement('div');
    chip.className = 'chip' + (settings.spotTypes.includes(day) ? ' active' : '');
    chip.textContent = DAY_ABBR[day];
    chip.addEventListener('click', function() {
      if (settings.spotTypes.includes(day)) {
        settings.spotTypes = settings.spotTypes.filter(function(d) { return d !== day; });
      } else {
        settings.spotTypes.push(day);
        settings.spotTypes.sort();
      }
      saveSettings(settings);
      renderSpotTypeChips();
      renderDaysStrip();
      renderRecommendations();
    });
    container.appendChild(chip);
  });
}

function renderScheduleList() {
  const container = document.getElementById('scheduleList');
  container.innerHTML = '';
  settings.blockedEvenings.forEach(function(day) {
    const item = document.createElement('div');
    item.className = 'schedule-item';
    item.innerHTML =
      '<span>' + DAY_NAMES[day] + ' evening</span>' +
      '<button class="remove-btn" data-day="' + day + '">&times;</button>';
    container.appendChild(item);
  });

  container.querySelectorAll('.remove-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var day = parseInt(btn.dataset.day);
      settings.blockedEvenings = settings.blockedEvenings.filter(function(d) { return d !== day; });
      saveSettings(settings);
      renderScheduleList();
      renderRecommendations();
    });
  });
}

// --- Init ---
function init() {
  validateParkedSpot();

  renderDate();
  renderStatusBanner();
  renderMySpot();
  renderDaysStrip();
  renderRecommendations();
  renderSpotTypeChips();
  renderScheduleList();

  // Gear button opens settings overlay
  document.getElementById('gearBtn').addEventListener('click', function() {
    document.getElementById('settingsOverlay').classList.add('open');
  });

  // Close settings
  document.getElementById('settingsClose').addEventListener('click', function() {
    document.getElementById('settingsOverlay').classList.remove('open');
  });

  // Click backdrop to close settings
  document.getElementById('settingsOverlay').addEventListener('click', function(e) {
    if (e.target === this) {
      this.classList.remove('open');
    }
  });

  // Clear parked spot
  document.getElementById('mySpotClear').addEventListener('click', clearParkedSpot);

  // Add blocked evening
  document.getElementById('addScheduleBtn').addEventListener('click', function() {
    var day = parseInt(document.getElementById('scheduleDay').value);
    if (!settings.blockedEvenings.includes(day)) {
      settings.blockedEvenings.push(day);
      settings.blockedEvenings.sort();
      saveSettings(settings);
      renderScheduleList();
      renderRecommendations();
    }
  });

  // Cancel pending park on outside tap
  document.addEventListener('click', function() {
    if (pendingParkDay !== null) {
      pendingParkDay = null;
      renderRecommendations();
    }
  });
}

init();
</script>
