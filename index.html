<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>The Street Cleaning Game</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-border: #2a2d3a;
    --text: #e8e8ed;
    --text-dim: #8b8d97;
    --green: #34d399;
    --green-bg: rgba(52, 211, 153, 0.12);
    --red: #f87171;
    --red-bg: rgba(248, 113, 113, 0.12);
    --blue: #60a5fa;
    --blue-bg: rgba(96, 165, 250, 0.12);
    --gray: #4b4d57;
    --yellow: #fbbf24;
    --yellow-bg: rgba(251, 191, 36, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    -webkit-font-smoothing: antialiased;
  }

  header {
    padding: 20px 0 8px;
    text-align: center;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  header .date {
    font-size: 14px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .status-banner {
    margin: 16px 0;
    padding: 14px 16px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    line-height: 1.4;
  }

  .status-banner.suspended {
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid rgba(52, 211, 153, 0.25);
  }

  .status-banner.in-effect {
    background: var(--red-bg);
    color: var(--red);
    border: 1px solid rgba(248, 113, 113, 0.25);
  }

  .status-banner.before {
    background: var(--yellow-bg);
    color: var(--yellow);
    border: 1px solid rgba(251, 191, 36, 0.25);
  }

  .status-banner.no-spots {
    background: rgba(75, 77, 87, 0.2);
    color: var(--text-dim);
    border: 1px solid var(--card-border);
  }

  .status-banner .reason {
    font-weight: 400;
    font-size: 13px;
    opacity: 0.85;
    display: block;
    margin-top: 4px;
  }

  .section-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 20px 0 10px 4px;
  }

  .days-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 2px 0 8px;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .days-strip::-webkit-scrollbar { display: none; }

  .day-card {
    flex: 0 0 auto;
    width: 72px;
    padding: 10px 6px;
    border-radius: 12px;
    text-align: center;
    background: var(--card);
    border: 1px solid var(--card-border);
  }

  .day-card.today {
    border-color: var(--blue);
    background: var(--blue-bg);
  }

  .day-card .day-name {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-dim);
    letter-spacing: 0.3px;
  }

  .day-card.today .day-name { color: var(--blue); }

  .day-card .day-num {
    font-size: 20px;
    font-weight: 700;
    margin: 4px 0;
  }

  .day-card .day-status {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .day-card .day-status.suspended {
    background: var(--green-bg);
    color: var(--green);
  }

  .day-card .day-status.in-effect {
    background: var(--red-bg);
    color: var(--red);
  }

  .day-card .day-status.no-cleaning {
    background: rgba(75, 77, 87, 0.3);
    color: var(--text-dim);
  }

  .recs {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .rec-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 14px 16px;
  }

  .rec-card.best {
    border-color: var(--green);
    background: var(--green-bg);
  }

  .rec-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
    gap: 10px;
  }

  .rec-loc {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.25;
    min-width: 0;
    flex: 1;
  }

  .rec-badge {
    font-size: 12px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .rec-badge.safe {
    background: var(--green-bg);
    color: var(--green);
  }

  .rec-badge.ok {
    background: var(--yellow-bg);
    color: var(--yellow);
  }

  .rec-badge.warn {
    background: var(--red-bg);
    color: var(--red);
  }

  .rec-meta {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 500;
    margin-bottom: 6px;
  }

  .rec-detail {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .rec-detail strong {
    color: var(--text);
  }

  .rec-move {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--card-border);
  }

  .rec-today-status {
    font-size: 13px;
    font-weight: 600;
    padding: 6px 8px;
    border-radius: 6px;
    margin-bottom: 8px;
  }

  .rec-today-status.before {
    background: var(--yellow-bg);
    color: var(--yellow);
  }

  .rec-today-status.during {
    background: var(--red-bg);
    color: var(--red);
  }

  .rec-today-status.after {
    background: var(--green-bg);
    color: var(--green);
  }

  .empty-state {
    text-align: center;
    color: var(--text-dim);
    padding: 24px 16px;
    font-size: 14px;
    background: var(--card);
    border: 1px dashed var(--card-border);
    border-radius: 12px;
  }

  .settings-toggle {
    display: block;
    width: 100%;
    margin: 24px 0 12px;
    padding: 12px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .settings-panel {
    display: none;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 24px;
  }

  .settings-panel.open { display: block; }

  .settings-group {
    margin-bottom: 16px;
  }

  .settings-group:last-child { margin-bottom: 0; }

  .settings-group > label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .spot-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 8px;
  }

  .spot-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: rgba(75, 77, 87, 0.2);
    border-radius: 8px;
    gap: 8px;
  }

  .spot-info { flex: 1; min-width: 0; }
  .spot-loc {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.3;
    word-break: break-word;
  }
  .spot-meta {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .spot-list .spot-empty {
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
    text-align: center;
    padding: 12px;
  }

  .add-spot-btn {
    padding: 10px;
    width: 100%;
    background: rgba(96, 165, 250, 0.08);
    border: 1px dashed rgba(96, 165, 250, 0.3);
    border-radius: 8px;
    color: var(--blue);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .add-spot-btn.open {
    background: rgba(75, 77, 87, 0.2);
    border-style: solid;
    border-color: var(--card-border);
    color: var(--text-dim);
  }

  .add-spot-form {
    display: none;
    margin-top: 8px;
  }
  .add-spot-form.open { display: block; }

  .add-spot-form input[type="search"] {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    background: rgba(75,77,87,0.3);
    border: 1px solid var(--card-border);
    color: var(--text);
    font-size: 14px;
    -webkit-appearance: none;
  }

  .spot-suggestions {
    margin-top: 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 320px;
    overflow-y: auto;
  }

  .spot-suggestion {
    padding: 8px 12px;
    background: rgba(96, 165, 250, 0.06);
    border: 1px solid rgba(96, 165, 250, 0.18);
    border-radius: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .spot-suggestion:active { background: rgba(96, 165, 250, 0.18); }

  .spot-suggestion .spot-sugg-loc {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .spot-suggestion .spot-sugg-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .spot-suggestion-empty {
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
    padding: 12px;
    font-style: italic;
  }

  .schedule-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .schedule-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: rgba(75, 77, 87, 0.2);
    border-radius: 8px;
    font-size: 14px;
  }

  .remove-btn {
    background: none;
    border: none;
    color: var(--red);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    padding: 0 6px;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }

  .add-schedule {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  .add-schedule select {
    flex: 1;
    padding: 8px 10px;
    border-radius: 8px;
    background: rgba(75, 77, 87, 0.3);
    border: 1px solid var(--card-border);
    color: var(--text);
    font-size: 14px;
    -webkit-appearance: none;
  }

  .add-schedule button {
    padding: 8px 14px;
    border-radius: 8px;
    background: var(--blue-bg);
    border: 1px solid var(--blue);
    color: var(--blue);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }

  .footer {
    text-align: center;
    padding: 20px 0 40px;
    font-size: 12px;
    color: var(--text-dim);
    opacity: 0.6;
    line-height: 1.6;
  }

  .footer a { color: var(--text-dim); }
</style>
</head>
<body>

<header>
  <h1>The Street Cleaning Game</h1>
  <div class="date" id="todayDate"></div>
</header>

<div id="statusBanner" class="status-banner"></div>

<div class="section-label">Next 7 Days</div>
<div class="days-strip" id="daysStrip"></div>

<div class="section-label">Spot Recommendations</div>
<div class="recs" id="recs"></div>

<button class="settings-toggle" id="settingsToggle">Settings</button>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-group">
    <label>My spots</label>
    <div class="spot-list" id="spotList"></div>
    <button class="add-spot-btn" id="addSpotBtn">+ Add spot</button>
    <div class="add-spot-form" id="addSpotForm">
      <input type="search" id="spotSearch" placeholder="Search by street name..." autocomplete="off" />
      <div class="spot-suggestions" id="spotSuggestions"></div>
    </div>
  </div>
  <div class="settings-group">
    <label>Evenings you can't move your car</label>
    <div class="schedule-list" id="scheduleList"></div>
    <div class="add-schedule">
      <select id="scheduleDay">
        <option value="0">Sunday evening</option>
        <option value="1">Monday evening</option>
        <option value="2">Tuesday evening</option>
        <option value="3">Wednesday evening</option>
        <option value="4">Thursday evening</option>
        <option value="5">Friday evening</option>
        <option value="6">Saturday evening</option>
      </select>
      <button id="addScheduleBtn">Add</button>
    </div>
  </div>
</div>

<div class="footer">
  Data: <a href="https://www.nyc.gov/html/dot/downloads/pdf/asp-calendar-2026.pdf">NYC DOT 2026 ASP Calendar</a> ·
  <a href="https://data.cityofnewyork.us/Transportation/Parking-Regulation-Locations-and-Signs/nfid-uabd">NYC OpenData parking signs</a>
</div>

  { date: '2026-09-21', name: 'Yom Kippur' },
  { date: '2026-09-26', name: 'Sukkot' },
  { date: '2026-09-27', name: 'Sukkot' },
  { date: '2026-10-03', name: 'Shemini Atzeret' },
  { date: '2026-10-04', name: 'Simchat Torah' },
  { date: '2026-10-12', name: "Indigenous Peoples' Day" },
  { date: '2026-11-01', name: "All Saints' Day" },
  { date: '2026-11-03', name: 'Election Day' },
  { date: '2026-11-08', name: 'Diwali' },
  { date: '2026-11-11', name: 'Veterans Day' },
  { date: '2026-11-26', name: 'Thanksgiving' },
  { date: '2026-12-08', name: 'Immaculate Conception' },
  { date: '2026-12-25', name: 'Christmas Day' },
];

const SUSPENSION_MAP = new Map(SUSPENSIONS_2026.map(s => [s.date, s.name]));

const DAY_NAMES = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
const DAY_ABBR = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
const MONTH_NAMES = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
const SIDE_NAMES = ['N', 'S', 'E', 'W'];
const SIDE_LONG = { N: 'north side', S: 'south side', E: 'east side', W: 'west side' };

// --- Date helpers ---
function toDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}
function isSuspended(d) {
  return SUSPENSION_MAP.get(toDateStr(d)) || null;
}
function daysBetween(a, b) {
  const aClean = new Date(a.getFullYear(), a.getMonth(), a.getDate());
  const bClean = new Date(b.getFullYear(), b.getMonth(), b.getDate());
  return Math.round((bClean - aClean) / 86400000);
}
function relativeDay(d) {
  const n = daysBetween(new Date(), d);
  if (n === 0) return '(today)';
  if (n === 1) return '(tomorrow)';
  if (n === -1) return '(yesterday)';
  if (n > 0) return '(' + n + ' days from now)';
  return '(' + Math.abs(n) + ' days ago)';
}

// --- Time helpers ---
function nowInMinutes() {
  const d = new Date();
  return d.getHours() * 60 + d.getMinutes();
}
function minutesToTimeStr(min) {
  const h24 = Math.floor(min / 60);
  const m = min % 60;
  const period = h24 >= 12 ? 'PM' : 'AM';
  const h12 = h24 === 0 ? 12 : (h24 > 12 ? h24 - 12 : h24);
  return m === 0 ? `${h12} ${period}` : `${h12}:${String(m).padStart(2, '0')} ${period}`;
}
function formatDuration(m) {
  if (m < 1) return 'less than a minute';
  if (m === 1) return '1 min';
  if (m < 60) return m + ' min';
  const h = Math.floor(m / 60), mm = m % 60;
  return mm === 0 ? `${h} hr` : `${h} hr ${mm} min`;
}

// --- Spot helpers ---
function spotForIndex(i) {
  const s = SPOTS[i];
  if (!s) return null;
  return {
    idx: i,
    street: STREETS[s[0]],
    from: STREETS[s[1]],
    to: STREETS[s[2]],
    side: SIDE_NAMES[s[3]],
    days: s[4],
    startMin: s[5],
    endMin: s[6],
    dx: s[7],
    dy: s[8],
  };
}
function prettyStreet(s) {
  if (!s) return '';
  return s.split(' ').map(w => {
    if (w.length <= 1) return w.toUpperCase();
    return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
  }).join(' ');
}
function spotLabel(spot) {
  return `${prettyStreet(spot.street)} btw ${prettyStreet(spot.from)} & ${prettyStreet(spot.to)} (${spot.side})`;
}
function spotShortLabel(spot) {
  // Drop the suffix "St" / "Ave" for brevity in the rec card header.
  const stripSuffix = s => s.replace(/\s+(St|Ave|Pl|Rd|Blvd|Pkwy)$/, '');
  return `${stripSuffix(prettyStreet(spot.street))} btw ${stripSuffix(prettyStreet(spot.from))}/${stripSuffix(prettyStreet(spot.to))} ${spot.side}`;
}
function daysFromMask(mask) {
  const out = [];
  for (let d = 0; d < 7; d++) if (mask & (1 << d)) out.push(d);
  return out;
}
function daysLabel(mask) {
  return daysFromMask(mask).map(d => DAY_ABBR[d]).join(' & ');
}
function timeRangeLabel(spot) {
  return `${minutesToTimeStr(spot.startMin)}–${minutesToTimeStr(spot.endMin)}`;
}

// Find the closest spot to home that cleans on the given day-of-week.
// SPOTS is pre-sorted by distance from home, so first match wins.
function findClosestSpotForDay(day) {
  for (let i = 0; i < SPOTS.length; i++) {
    if (SPOTS[i][4] & (1 << day)) return i;
  }
  return -1;
}

// --- Settings (with migration) ---
const DEFAULT_SPOT_DAYS = [1, 2, 4, 5]; // Mon, Tue, Thu, Fri

function defaultMySpots() {
  return DEFAULT_SPOT_DAYS.map(findClosestSpotForDay).filter(i => i >= 0);
}

function loadSettings() {
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem('asp-settings')); } catch {}
  if (!saved || typeof saved !== 'object') {
    return { mySpots: defaultMySpots(), blockedEvenings: [] };
  }
  // Migrate old day-only spotTypes → mySpots indices
  if (Array.isArray(saved.spotTypes) && (saved.spotTypes.length === 0 || typeof saved.spotTypes[0] === 'number')) {
    const migrated = saved.spotTypes.map(findClosestSpotForDay).filter(i => i >= 0);
    saved.mySpots = migrated;
    delete saved.spotTypes;
    localStorage.setItem('asp-settings', JSON.stringify(saved));
  }
  if (!Array.isArray(saved.mySpots)) saved.mySpots = defaultMySpots();
  if (!Array.isArray(saved.blockedEvenings)) saved.blockedEvenings = [];
  // Filter out any indices that fell out of bounds since the data was updated.
  saved.mySpots = saved.mySpots.filter(i => i >= 0 && i < SPOTS.length);
  return saved;
}

function saveSettings(s) {
  localStorage.setItem('asp-settings', JSON.stringify(s));
}

let settings = loadSettings();

// --- Cleaning calculations ---

// Find the next date this spot will actually be cleaned, walking forward up to 4 weeks
// past suspensions and Sundays.
function nextCleaningEvent(spot, fromDate) {
  const todayClean = new Date(fromDate.getFullYear(), fromDate.getMonth(), fromDate.getDate());

  // Does today still count? Yes if today is in the day mask, not suspended, not Sunday,
  // and current time is before the END of the cleaning window.
  const todayDay = todayClean.getDay();
  const now = nowInMinutes();
  const startSearch = (
    (spot.days & (1 << todayDay)) &&
    todayDay !== 0 &&
    !isSuspended(todayClean) &&
    now < spot.endMin
  ) ? todayClean : addDays(todayClean, 1);

  const suspendedDates = [];
  for (let i = 0; i < 28; i++) {
    const d = addDays(startSearch, i);
    if (!(spot.days & (1 << d.getDay()))) continue;
    if (d.getDay() === 0) {
      suspendedDates.push({ date: d, reason: 'Sunday' });
      continue;
    }
    const reason = isSuspended(d);
    if (reason) {
      suspendedDates.push({ date: d, reason });
      continue;
    }
    return { date: d, suspendedDates };
  }
  return { date: null, suspendedDates };
}

// Live status for a single spot, *today only*.
function getTodayStatus(spot) {
  const today = new Date();
  if (today.getDay() === 0) return { state: 'noCleaningToday' };
  if (isSuspended(today)) return { state: 'suspended', reason: isSuspended(today) };
  if (!(spot.days & (1 << today.getDay()))) return { state: 'noCleaningToday' };
  const now = nowInMinutes();
  if (now < spot.startMin) {
    return { state: 'before', minutesUntilStart: spot.startMin - now };
  }
  if (now < spot.endMin) {
    return { state: 'during', minutesUntilEnd: spot.endMin - now };
  }
  return { state: 'after' };
}

// Banner aggregates across all of user's spots. Pick the most urgent.
function getBannerStatus() {
  const today = new Date();
  if (settings.mySpots.length === 0) return { state: 'empty' };

  const reason = isSuspended(today);
  if (reason) return { state: 'suspended', reason };

  if (today.getDay() === 0) return { state: 'sunday' };

  const spots = settings.mySpots.map(spotForIndex).filter(Boolean);
  const todaySpots = spots.filter(s => s.days & (1 << today.getDay()));
  if (todaySpots.length === 0) return { state: 'noneToday' };

  const now = nowInMinutes();
  const during = todaySpots
    .filter(s => now >= s.startMin && now < s.endMin)
    .sort((a, b) => a.endMin - b.endMin);
  if (during.length) {
    return { state: 'during', spot: during[0], minutesUntilEnd: during[0].endMin - now };
  }

  const before = todaySpots
    .filter(s => now < s.startMin)
    .sort((a, b) => a.startMin - b.startMin);
  if (before.length) {
    return { state: 'before', spot: before[0], minutesUntilStart: before[0].startMin - now };
  }

  // All of today's spots are past their cleaning window.
  return { state: 'afterAll', spots: todaySpots };
}

// --- Renderers ---

function renderDate() {
  const d = new Date();
  document.getElementById('todayDate').textContent =
    DAY_NAMES[d.getDay()] + ', ' + MONTH_NAMES[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

function renderStatusBanner() {
  const el = document.getElementById('statusBanner');
  const s = getBannerStatus();
  let cls, html;
  switch (s.state) {
    case 'empty':
      cls = 'no-spots';
      html = 'No spots configured<span class="reason">Add one in Settings below</span>';
      break;
    case 'suspended':
      cls = 'suspended';
      html = 'ASP is suspended today<span class="reason">' + s.reason + '</span>';
      break;
    case 'sunday':
      cls = 'suspended';
      html = 'No street cleaning on Sundays';
      break;
    case 'noneToday':
      cls = 'suspended';
      html = 'No cleaning for your spots today<span class="reason">Safe ' + DAY_NAMES[new Date().getDay()] + '</span>';
      break;
    case 'before':
      cls = 'before';
      html = 'Cleaning starts in ' + formatDuration(s.minutesUntilStart) +
        '<span class="reason">' + spotShortLabel(s.spot) + ' · ' + minutesToTimeStr(s.spot.startMin) + '</span>';
      break;
    case 'during':
      cls = 'in-effect';
      html = 'Cleaning in progress · ends in ' + formatDuration(s.minutesUntilEnd) +
        '<span class="reason">' + spotShortLabel(s.spot) + ' · ends ' + minutesToTimeStr(s.spot.endMin) + '</span>';
      break;
    case 'afterAll':
      cls = 'suspended';
      html = "Today's cleaning is done<span class=\"reason\">Safe until tomorrow</span>";
      break;
    default:
      cls = 'suspended';
      html = 'No cleaning today';
  }
  el.className = 'status-banner ' + cls;
  el.innerHTML = html;
}

function renderDaysStrip() {
  const container = document.getElementById('daysStrip');
  container.innerHTML = '';
  const today = new Date();

  for (let i = 0; i < 7; i++) {
    const d = addDays(today, i);
    const dayOfWeek = d.getDay();
    const reason = isSuspended(d);
    const hasMatch = settings.mySpots.some(idx => SPOTS[idx] && (SPOTS[idx][4] & (1 << dayOfWeek)));

    const card = document.createElement('div');
    card.className = 'day-card' + (i === 0 ? ' today' : '');

    let statusHtml;
    if (dayOfWeek === 0) {
      statusHtml = '<div class="day-status no-cleaning">No ASP</div>';
    } else if (reason) {
      statusHtml = '<div class="day-status suspended">Off</div>';
    } else if (!hasMatch) {
      statusHtml = '<div class="day-status no-cleaning">N/A</div>';
    } else {
      statusHtml = '<div class="day-status in-effect">Active</div>';
    }

    card.innerHTML =
      '<div class="day-name">' + DAY_ABBR[dayOfWeek] + '</div>' +
      '<div class="day-num">' + d.getDate() + '</div>' +
      statusHtml;

    container.appendChild(card);
  }
}

function analyzeSpot(idx) {
  const spot = spotForIndex(idx);
  if (!spot) return null;
  const today = new Date();
  const todayClean = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const next = nextCleaningEvent(spot, today);
  if (!next.date) {
    return { spot, nextCleaningDate: null, moveByEvening: null, safeDays: 99, suspendedDates: next.suspendedDates, hasConflict: false };
  }
  const moveByEvening = addDays(next.date, -1);
  const safeDays = daysBetween(todayClean, moveByEvening);
  const hasConflict = settings.blockedEvenings.includes(moveByEvening.getDay());
  return { spot, nextCleaningDate: next.date, moveByEvening, safeDays, suspendedDates: next.suspendedDates, hasConflict };
}

function renderRecommendations() {
  const container = document.getElementById('recs');
  container.innerHTML = '';

  if (settings.mySpots.length === 0) {
    container.innerHTML = '<div class="empty-state">No spots configured yet — open Settings and add one.</div>';
    return;
  }

  const analyses = settings.mySpots.map(analyzeSpot).filter(Boolean);
  analyses.sort((a, b) => b.safeDays - a.safeDays);
  const bestSafe = analyses[0].safeDays;

  analyses.forEach(a => {
    const card = document.createElement('div');
    const isBest = a.safeDays === bestSafe && a.safeDays > 0;
    card.className = 'rec-card' + (isBest ? ' best' : '');

    let badgeClass, badgeText;
    if (a.safeDays >= 5) { badgeClass = 'safe'; badgeText = a.safeDays + ' days safe'; }
    else if (a.safeDays >= 3) { badgeClass = 'ok'; badgeText = a.safeDays + ' days safe'; }
    else if (a.safeDays >= 1) { badgeClass = 'warn'; badgeText = a.safeDays + (a.safeDays === 1 ? ' day' : ' days'); }
    else { badgeClass = 'warn'; badgeText = 'Move tonight'; }

    let todayStatusHtml = '';
    const t = getTodayStatus(a.spot);
    if (t.state === 'before') {
      todayStatusHtml = '<div class="rec-today-status before">⏱ Cleaning today in ' + formatDuration(t.minutesUntilStart) +
        ' (' + minutesToTimeStr(a.spot.startMin) + ')</div>';
    } else if (t.state === 'during') {
      todayStatusHtml = '<div class="rec-today-status during">🚨 Cleaning in progress — ends in ' + formatDuration(t.minutesUntilEnd) + '</div>';
    } else if (t.state === 'after') {
      todayStatusHtml = '<div class="rec-today-status after">✓ Today\'s cleaning done</div>';
    }

    let detail = '';
    if (a.suspendedDates.length) {
      const names = a.suspendedDates.map(s =>
        DAY_ABBR[s.date.getDay()] + ' ' + MONTH_NAMES[s.date.getMonth()] + ' ' + s.date.getDate() + ' ' + relativeDay(s.date) + ' — ' + s.reason
      );
      detail = 'Cleaning suspended: ' + names.join(', ') + '. ';
    }
    if (a.nextCleaningDate) {
      detail += 'Next cleaning: <strong>' + DAY_NAMES[a.nextCleaningDate.getDay()] + ', ' +
        MONTH_NAMES[a.nextCleaningDate.getMonth()] + ' ' + a.nextCleaningDate.getDate() + ' ' + relativeDay(a.nextCleaningDate) +
        ' at ' + minutesToTimeStr(a.spot.startMin) + '</strong>';
    }

    let moveHtml = '';
    if (a.moveByEvening) {
      let moveText = 'Move by: ' + DAY_NAMES[a.moveByEvening.getDay()] + ' evening, ' +
        MONTH_NAMES[a.moveByEvening.getMonth()] + ' ' + a.moveByEvening.getDate() + ' ' + relativeDay(a.moveByEvening);
      if (a.hasConflict) moveText += ' <span style="color:var(--red)">You\'re blocked this evening</span>';
      moveHtml = '<div class="rec-move">' + moveText + '</div>';
    }

    card.innerHTML =
      '<div class="rec-header">' +
        '<div class="rec-loc">' + spotShortLabel(a.spot) + '</div>' +
        '<div class="rec-badge ' + badgeClass + '">' + badgeText + '</div>' +
      '</div>' +
      '<div class="rec-meta">' + daysLabel(a.spot.days) + ' · ' + timeRangeLabel(a.spot) + '</div>' +
      todayStatusHtml +
      '<div class="rec-detail">' + detail + '</div>' +
      moveHtml;

    container.appendChild(card);
  });
}

// --- Settings UI ---

function renderSpotList() {
  const container = document.getElementById('spotList');
  container.innerHTML = '';
  if (settings.mySpots.length === 0) {
    container.innerHTML = '<div class="spot-empty">No spots yet. Tap "+ Add spot" below.</div>';
    return;
  }
  settings.mySpots.forEach(idx => {
    const spot = spotForIndex(idx);
    if (!spot) return;
    const item = document.createElement('div');
    item.className = 'spot-item';
    item.innerHTML =
      '<div class="spot-info">' +
        '<div class="spot-loc">' + spotLabel(spot) + '</div>' +
        '<div class="spot-meta">' + daysLabel(spot.days) + ' · ' + timeRangeLabel(spot) + '</div>' +
      '</div>' +
      '<button class="remove-btn" data-idx="' + idx + '" aria-label="Remove">&times;</button>';
    container.appendChild(item);
  });
  container.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx, 10);
      settings.mySpots = settings.mySpots.filter(i => i !== idx);
      saveSettings(settings);
      renderAll();
    });
  });
}

function searchSpots(query) {
  const q = (query || '').toUpperCase().trim();
  if (!q) {
    // Empty query → show nearest unselected spots as suggestions
    return suggestNearby(20);
  }
  const taken = new Set(settings.mySpots);
  const matches = [];
  for (let i = 0; i < SPOTS.length; i++) {
    if (taken.has(i)) continue;
    const r = SPOTS[i];
    const street = STREETS[r[0]];
    const from = STREETS[r[1]];
    const to = STREETS[r[2]];
    if (street.includes(q) || from.includes(q) || to.includes(q)) {
      matches.push(i);
      if (matches.length >= 50) break;
    }
  }
  return matches;
}

function suggestNearby(limit) {
  const taken = new Set(settings.mySpots);
  const out = [];
  for (let i = 0; i < SPOTS.length && out.length < limit; i++) {
    if (taken.has(i)) continue;
    out.push(i);
  }
  return out;
}

function renderSuggestions(indices) {
  const container = document.getElementById('spotSuggestions');
  container.innerHTML = '';
  if (indices.length === 0) {
    container.innerHTML = '<div class="spot-suggestion-empty">No matching spots.</div>';
    return;
  }
  indices.forEach(idx => {
    const spot = spotForIndex(idx);
    const el = document.createElement('div');
    el.className = 'spot-suggestion';
    el.dataset.idx = idx;
    el.innerHTML =
      '<div class="spot-sugg-loc">' + spotLabel(spot) + '</div>' +
      '<div class="spot-sugg-meta">' + daysLabel(spot.days) + ' · ' + timeRangeLabel(spot) + '</div>';
    el.addEventListener('click', () => {
      if (!settings.mySpots.includes(idx)) {
        settings.mySpots.push(idx);
        saveSettings(settings);
      }
      document.getElementById('spotSearch').value = '';
      renderAll();
      renderSuggestions(searchSpots(''));
    });
    container.appendChild(el);
  });
}

function renderScheduleList() {
  const container = document.getElementById('scheduleList');
  container.innerHTML = '';
  settings.blockedEvenings.forEach(day => {
    const item = document.createElement('div');
    item.className = 'schedule-item';
    item.innerHTML =
      '<span>' + DAY_NAMES[day] + ' evening</span>' +
      '<button class="remove-btn" data-day="' + day + '" aria-label="Remove">&times;</button>';
    container.appendChild(item);
  });
  container.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const day = parseInt(btn.dataset.day, 10);
      settings.blockedEvenings = settings.blockedEvenings.filter(d => d !== day);
      saveSettings(settings);
      renderScheduleList();
      renderRecommendations();
    });
  });
}

function renderAll() {
  renderDate();
  renderStatusBanner();
  renderDaysStrip();
  renderRecommendations();
  renderSpotList();
  renderScheduleList();
}

// --- Init ---
function init() {
  renderAll();

  document.getElementById('settingsToggle').addEventListener('click', () => {
    const panel = document.getElementById('settingsPanel');
    panel.classList.toggle('open');
    document.getElementById('settingsToggle').textContent =
      panel.classList.contains('open') ? 'Close Settings' : 'Settings';
  });

  const addSpotBtn = document.getElementById('addSpotBtn');
  const addSpotForm = document.getElementById('addSpotForm');
  const spotSearch = document.getElementById('spotSearch');
  addSpotBtn.addEventListener('click', () => {
    const isOpen = addSpotForm.classList.toggle('open');
    addSpotBtn.classList.toggle('open', isOpen);
    addSpotBtn.textContent = isOpen ? 'Close' : '+ Add spot';
    if (isOpen) {
      renderSuggestions(searchSpots(''));
      setTimeout(() => spotSearch.focus(), 50);
    }
  });
  spotSearch.addEventListener('input', () => {
    renderSuggestions(searchSpots(spotSearch.value));
  });

  document.getElementById('addScheduleBtn').addEventListener('click', () => {
    const day = parseInt(document.getElementById('scheduleDay').value, 10);
    if (!settings.blockedEvenings.includes(day)) {
      settings.blockedEvenings.push(day);
      settings.blockedEvenings.sort();
      saveSettings(settings);
      renderScheduleList();
      renderRecommendations();
    }
  });

  // Live tick: refresh banner + rec cards once a minute so countdowns stay accurate.
  setInterval(() => {
    renderStatusBanner();
    renderRecommendations();
  }, 60000);
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
      renderStatusBanner();
      renderRecommendations();
    }
  });
}

init();
</script>
